# Yazi Configuration

[mgr]
# Layout ratio: [parent, current, preview]
ratio = [1, 4, 3]

# Sorting options
sort_by = "natural"
sort_sensitive = false
sort_reverse = false
sort_dir_first = true
sort_translit = false

# Display options
linemode = "size"
show_hidden = true
show_symlink = true
scrolloff = 5

# Mouse events
mouse_events = ["click", "scroll"]

# Terminal title format
title_format = "Yazi: {cwd}"

[preview]
# Text preview
wrap = "no"
tab_size = 2

# Image preview
max_width = 1920
max_height = 1080
cache_dir = ""
image_delay = 30
image_filter = "lanczos3"
image_quality = 80

[opener]
edit = [
    { run = '$EDITOR "$@"', block = true, desc = "Edit with Neovim" },
]
open = [
    { run = 'xdg-open "$@"', desc = "Open" },
]
view = [
    { run = 'swayimg "$@"', orphan = true, desc = "View with swayimg" },
]
extract = [
    { run = 'ya pub extract --list "$@"', desc = "Extract here" },
]
play = [
    { run = 'mpv "$@"', orphan = true, desc = "Play with mpv" },
]
browser = [
    { run = 'brave "$@"', orphan = true, desc = "Open in Brave" },
]

[open]
prepend_rules = [
    # PDF
    { url = "*.pdf", use = "browser" },
    # Images
    { mime = "image/*", use = "view" },
    # Video/audio
    { mime = "video/*", use = "play" },
    { mime = "audio/*", use = "play" },
    # Archives
    { url = "*.{zip,tar,gz,bz2,xz,7z,rar}", use = "extract" },
]
append_rules = [
    # Fallback — everything else opens in editor
    { url = "*", use = "edit" },
]

[tasks]
micro_workers = 5
macro_workers = 10
bizarre_retry = 5
suppress_preload = false
image_alloc = 536870912  # 512MB
image_bound = [0, 0]
