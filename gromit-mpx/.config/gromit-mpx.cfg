# Gromit-MPX tool definitions — user override of /etc/gromit-mpx/gromit-mpx.cfg
#
# This cfg is the target of a Paint-style composable tool picker driven by
# ~/.config/hypr/scripts/gromit-tool.sh. Tool names are the Cartesian product
# {red,blue,yellow,green} × {Pen,Line,Rectangle,Circle,Filled Circle,Smoothed}
# plus a standalone Eraser. The script composes "${color} ${shape}" and writes
# it into the "default" mapping, then calls --reload.
#
# All colors use explicit rgba(r, g, b, 1.0) to force full alpha on strokes.
# Combined with canvas Opacity=1.0 in gromit-mpx.ini (chattr +i locked) this
# guarantees crisp, fully-opaque output.

#
# Pens — 4 colors, size=5
#
"red Pen"    = PEN (size=5 color="rgba(255, 0, 0, 1.0)");
"blue Pen"   = "red Pen" (color="rgba(0, 0, 255, 1.0)");
"yellow Pen" = "red Pen" (color="rgba(255, 255, 0, 1.0)");
"green Pen"  = "red Pen" (color="rgba(0, 200, 0, 1.0)");

#
# Lines — 4 colors, size=5
#
"red Line"    = LINE (size=5 color="rgba(255, 0, 0, 1.0)");
"blue Line"   = "red Line" (color="rgba(0, 0, 255, 1.0)");
"yellow Line" = "red Line" (color="rgba(255, 255, 0, 1.0)");
"green Line"  = "red Line" (color="rgba(0, 200, 0, 1.0)");

#
# Rectangles — 4 colors, size=5
#
"red Rectangle"    = RECT (size=5 color="rgba(255, 0, 0, 1.0)");
"blue Rectangle"   = "red Rectangle" (color="rgba(0, 0, 255, 1.0)");
"yellow Rectangle" = "red Rectangle" (color="rgba(255, 255, 0, 1.0)");
"green Rectangle"  = "red Rectangle" (color="rgba(0, 200, 0, 1.0)");

#
# Circles — 4 colors, size=5 (outlined, no fill)
#
"red Circle"    = CIRCLE (size=5 color="rgba(255, 0, 0, 1.0)");
"blue Circle"   = "red Circle" (color="rgba(0, 0, 255, 1.0)");
"yellow Circle" = "red Circle" (color="rgba(255, 255, 0, 1.0)");
"green Circle"  = "red Circle" (color="rgba(0, 200, 0, 1.0)");

#
# Filled Circles — 4 colors. Outline stays black; only fillcolor varies, so
# these can't inherit from a colored base cleanly — spell out each one.
#
"red Filled Circle"    = CIRCLE (size=3 color="rgba(0, 0, 0, 1.0)" fillcolor="rgba(255, 0, 0, 1.0)");
"blue Filled Circle"   = CIRCLE (size=3 color="rgba(0, 0, 0, 1.0)" fillcolor="rgba(0, 0, 255, 1.0)");
"yellow Filled Circle" = CIRCLE (size=3 color="rgba(0, 0, 0, 1.0)" fillcolor="rgba(255, 255, 0, 1.0)");
"green Filled Circle"  = CIRCLE (size=3 color="rgba(0, 0, 0, 1.0)" fillcolor="rgba(0, 200, 0, 1.0)");

#
# Smoothed strokes — 4 colors, noise-reducing pen for shaky hands
#
"red Smoothed"    = SMOOTH (size=5 color="rgba(255, 0, 0, 1.0)" simplify=10 snap=30);
"blue Smoothed"   = "red Smoothed" (color="rgba(0, 0, 255, 1.0)");
"yellow Smoothed" = "red Smoothed" (color="rgba(255, 255, 0, 1.0)");
"green Smoothed"  = "red Smoothed" (color="rgba(0, 200, 0, 1.0)");

#
# Eraser — standalone, no color axis
#
"Eraser" = ERASER (size=75);

#
# Modifier mappings — "default" is rewritten live by gromit-tool.sh.
# The modifier variants stay useful as quick alternates without leaving
# the current composed tool.
#
"default"              = "red Pen";
"default"[SHIFT]       = "blue Pen";
"default"[CONTROL]     = "yellow Pen";
"default"[2]           = "green Pen";
"default"[Button3]     = "Eraser";
"default"[ALT]         = "blue Circle";
"default"[ALT,SHIFT]   = "red Filled Circle";
