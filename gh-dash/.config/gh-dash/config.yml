# gh-dash configuration
# Managed via dotfiles — stow gh-dash

prSections:
  - title: My Pull Requests
    filters: is:open author:@me
  - title: Needs My Review
    filters: is:open review-requested:@me
  - title: LogisHub
    filters: is:open repo:Logis-Ressources-Inc/LogisHub
  - title: Involved
    filters: is:open involves:@me -author:@me

issuesSections:
  - title: My Issues
    filters: is:open author:@me
  - title: Assigned
    filters: is:open assignee:@me
  - title: LogisHub Issues
    filters: is:open repo:Logis-Ressources-Inc/LogisHub

notificationsSections:
  - title: All
    filters: ""
  - title: Review Requested
    filters: reason:review-requested
  - title: Participating
    filters: reason:participating
  - title: Mentioned
    filters: reason:mention
  - title: Assigned
    filters: reason:assign

repo:
  branchesRefetchIntervalSeconds: 30
  prsRefetchIntervalSeconds: 60

defaults:
  preview:
    open: false
    width: 70
  prsLimit: 20
  prApproveComment: LGTM
  issuesLimit: 20
  notificationsLimit: 20
  view: prs
  layout:
    prs:
      updatedAt:
        width: 5
      createdAt:
        width: 5
      repo:
        width: 20
      author:
        width: 15
      authorIcon:
        hidden: false
      assignees:
        width: 20
        hidden: true
      base:
        width: 15
        hidden: true
      lines:
        width: 15
    issues:
      updatedAt:
        width: 5
      createdAt:
        width: 5
      repo:
        width: 15
      creator:
        width: 10
      creatorIcon:
        hidden: false
      assignees:
        width: 20
        hidden: true
  refetchIntervalMinutes: 30

keybindings:
  universal:
    - key: g
      name: lazygit
      command: >
        cd {{.RepoPath}} && lazygit
  prs:
    - key: C
      name: code review
      command: >
        tmux new-window -n "PR-{{.PrNumber}}"
        'cd {{.RepoPath}} && wt checkout pr:{{.PrNumber}} &&
        claude --print "Review PR #{{.PrNumber}} on branch {{.HeadRefName}}. Check code quality, security, and tests."'
    - key: W
      name: worktree
      command: >
        cd {{.RepoPath}} && wt checkout pr:{{.PrNumber}}
    - key: D
      name: diff
      command: >
        cd {{.RepoPath}} && gh pr diff {{.PrNumber}} | diffnav
    - key: M
      name: merge
      command: >
        cd {{.RepoPath}} && gh pr merge {{.PrNumber}} --squash --delete-branch
    - key: B
      name: browse
      command: >
        gh pr view {{.PrNumber}} --repo {{.RepoName}} --web

theme:
  colors:
    text:
      primary: "#F7F1FF"
      secondary: "#5AD4E6"
      inverted: "#F7F1FF"
      faint: "#3E4057"
      warning: "#FC618D"
      success: "#7BD88F"
    background:
      selected: "#535155"
    border:
      primary: "#948AE3"
      secondary: "#7BD88F"
      faint: "#3E4057"
  ui:
    sectionsShowCount: true
    table:
      showSeparator: true
      compact: true

pager:
  diff: "diffnav"

confirmQuit: false
showAuthorIcons: true
smartFilteringAtLaunch: true
