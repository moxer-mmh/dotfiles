set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -ag terminal-overrides ",xterm-256color:RGB"
set -sa terminal-overrides ",xterm*:Tc"
set -g default-shell /bin/zsh
set -g history-limit 50000
set -g mouse off
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -sg escape-time 0
set -g focus-events on

# Yazi image preview support
set -g allow-passthrough on
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM

# Theme colors — generated by theme system
source-file -q ~/.config/tmux/theme.conf

unbind C-b
unbind C-Space

set -g prefix M-Space
bind M-Space send-prefix

bind Left select-pane -L
bind Down select-pane -D
bind Up select-pane -U
bind Right select-pane -R
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

bind V split-window -h -c "#{pane_current_path}"
bind v split-window -h -c "#{pane_current_path}"
bind B split-window -v -c "#{pane_current_path}"
bind b split-window -v -c "#{pane_current_path}"

bind n new-window -c "#{pane_current_path}"
bind -n M-Left previous-window
bind -n M-Right next-window
bind -n M-Up new-window
bind -n M-Down kill-window

bind & select-window -t 1
bind é select-window -t 2
bind '"' select-window -t 3
bind "'" select-window -t 4
bind '(' select-window -t 5
bind '-' select-window -t 6
bind è select-window -t 7
bind '_' select-window -t 8
bind ç select-window -t 9

bind s new-session -c "#{pane_current_path}" \; command-prompt -p "Cosmic session name:" "rename-session '%%'"
bind c detach-client
bind X kill-session
bind R command-prompt -p "Rename cosmic session:" "rename-session '%%'"

bind Space copy-mode
bind p paste-buffer
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -selection clipboard"
bind -T copy-mode-vi r send-keys -X rectangle-toggle
bind -T copy-mode-vi h send-keys -X cursor-left
bind -T copy-mode-vi j send-keys -X cursor-down
bind -T copy-mode-vi k send-keys -X cursor-up
bind -T copy-mode-vi l send-keys -X cursor-right

bind r source-file ~/.tmux.conf \; display-message "🌌 Cosmic configuration reloaded! 🚀"
bind C-l send-keys 'clear' \; send-keys 'Enter' \; clear-history
bind e setw synchronize-panes \; display-message "Pane synchronization: #{?synchronize-panes,ON,OFF}"
bind t set status

set -g status-position top
set -g status-left-length 40
set -g status-right-length 120
set -g status-interval 1
set -g display-panes-time 2000
# All color styles are in ~/.config/tmux/theme.conf (generated by theme system)

set -g repeat-time 600
setw -g monitor-activity on
set -g visual-activity off
set -g visual-bell off
set -g bell-action none

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'
run '~/.tmux/plugins/tpm/tpm'

setw -g aggressive-resize on
set -g set-titles on
set -g set-titles-string "🚀 Cosmic Terminal: #S → #W"
set -g set-clipboard on
