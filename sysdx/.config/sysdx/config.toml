# sysdx config — Generated by theme system, do not edit manually

[display]
journal_lines    = 60
tick_rate_ms     = 250
show_description = true
list_width_pct   = 38
date_format      = "%H:%M:%S"

[keybinds]
move_down    = "j"
move_up      = "k"
page_down    = "ctrl-d"
page_up      = "ctrl-u"
go_top       = "g"
go_bottom    = "G"
filter       = "/"
action_menu  = "enter"
switch_scope = "tab"
open_logs    = "l"
quit         = "q"

[colors]
background     = "#1e1e2e"
surface        = "#313244"
border         = "#cba6f7"
border_focused = "#a6e3a1"
text           = "#cdd6f4"
text_dim       = "#a6adc8"
selection_bg   = "#45475a"
selection_fg   = "#cdd6f4"
active         = "#a6e3a1"
inactive       = "#a6adc8"
failed         = "#f38ba8"
filter_bar     = "#f9e2af"
header         = "#cba6f7"
