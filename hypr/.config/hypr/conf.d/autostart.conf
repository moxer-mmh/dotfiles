# Autostart Applications
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = gnome-keyring-daemon --start --components=secrets

# Clipboard
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# Authentication agent
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1

# Network tray
exec-once = nm-applet --indicator

# Idle management — disabled by default (use caffeine toggle to enable)
# exec-once = hypridle

# Night light (warm 3000K default)
exec-once = wlsunset -t 3000 -T 3001

# Master startup (waybar, wallpaper, swaync, battery, udiskie)
exec-once = ~/.config/hypr/scripts/space-station-startup.sh
