# Autostart Applications
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = gnome-keyring-daemon --start --components=secrets

# Clipboard
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# Authentication agent
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1

# Network tray
exec-once = nm-applet --indicator

# Idle management — disabled by default (use caffeine toggle to enable)
# exec-once = hypridle

# Night light (warm 3000K default)
exec-once = wlsunset -t 3000 -T 3001

# Screen annotation overlay (idle until toggled via Super+I)
# Using patched binary at /usr/local/bin/gromit-mpx (source: /tmp/gromit-build).
# Stock /usr/bin/gromit-mpx hardcodes canvas opacity to 0.75 in
# src/callbacks.c on_composited_changed() — strokes render faded under any
# compositor. Patch changes it to honor data->opacity (from .ini) and
# switches Cairo AA from SUBPIXEL to GOOD for crisper edges.
# GDK_BACKEND=x11 forces GTK to use X11 backend (via Xwayland) — gromit-mpx
# is X11-only and fails if GTK auto-selects the Wayland backend.
# Delay + refocus: gromit-mpx creates X11 override-redirect windows that
# bypass Hyprland window rules; sleep lets Hyprland settle, then
# focuscurrentorlast kicks focus off the overlay.
exec-once = sh -c 'sleep 4 && env GDK_BACKEND=x11 /usr/local/bin/gromit-mpx & sleep 2 && hyprctl dispatch focuscurrentorlast'

# Master startup (waybar, wallpaper, swaync, battery, udiskie)
exec-once = ~/.config/hypr/scripts/space-station-startup.sh
