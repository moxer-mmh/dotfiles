# Window Rules — Workspace assignments
windowrule = workspace 1, match:class kitty
windowrule = workspace 3, match:class Code
windowrule = workspace 5, match:class obsidian
windowrule = workspace 7 silent, match:class Spotify

# Opacity overrides (global is 0.85 in appearance.conf)
windowrule = opacity 1.0 0.99, match:class brave-browser
windowrule = opacity 1.0 0.95, match:class firefox
windowrule = opacity 1.0 0.95, match:class chromium

# Float utility windows
windowrule = float on, match:class pavucontrol
windowrule = float on, match:class nm-connection-editor
windowrule = float on, match:class blueman-manager
windowrule = float on, match:class org.gnome.Calculator
windowrule = float on, match:title Picture-in-Picture
windowrule = float on, match:class xdg-desktop-portal-gtk

# Size constraints for float windows
windowrule = size 800 500, match:class pavucontrol
windowrule = size 800 500, match:class blueman-manager
