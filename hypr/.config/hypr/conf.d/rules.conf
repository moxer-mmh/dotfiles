# Window Rules — Workspace assignments
windowrule = workspace 1, match:class kitty
windowrule = workspace 2, match:class brave-browser
windowrule = workspace 3, match:class Code
windowrule = workspace 5, match:class obsidian
windowrule = workspace 7 silent, match:class Spotify

# Float utility windows
windowrule = float on, match:class pavucontrol
windowrule = float on, match:class nm-connection-editor
windowrule = float on, match:class blueman-manager
windowrule = float on, match:class org.gnome.Calculator
windowrule = float on, match:title Picture-in-Picture
windowrule = float on, match:class xdg-desktop-portal-gtk

# Size constraints for float windows
windowrule = size 800 500, match:class pavucontrol
windowrule = size 800 500, match:class blueman-manager

# Screen annotation overlay (gromit-mpx / XWayland)
# gromit-mpx creates X11 override-redirect windows, so it does NOT appear in
# `hyprctl clients` and can't be tiled/floated via rules. BUT Hyprland still
# applies per-window decoration effects (blur, dim, shadow) to the XWayland
# surface — and that's exactly what makes strokes look blurry: Hyprland's
# global blur reads through the transparent canvas. Disable those effects
# explicitly so the overlay renders at 1:1 pixel fidelity.
# Only no_blur / no_dim / no_anim are valid window-rule flags in Hyprland
# 0.54+. Borders and shadows don't apply to X11 override-redirect windows
# anyway, so there's nothing to suppress there.
windowrule = no_blur on, match:class Gromit-mpx
windowrule = no_dim on, match:class Gromit-mpx
windowrule = no_anim on, match:class Gromit-mpx
