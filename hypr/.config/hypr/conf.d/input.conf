# Input Configuration
input {
    kb_layout = fr
    kb_variant = azerty
    kb_model =
    kb_options = numpad:on
    kb_rules =
    numlock_by_default = true

    follow_mouse = 1

    touchpad {
        natural_scroll = true
        tap-to-click = true
        drag_lock = true
    }

    sensitivity = 0
}
