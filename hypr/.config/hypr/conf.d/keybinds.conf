# Keybinds
$mainMod = SUPER

# ── App Launchers ──────────────────────────────────────────
bind = $mainMod, RETURN, exec, kitty
bind = $mainMod, Q, killactive
bind = $mainMod SHIFT, Q, forcekillactive
bind = $mainMod, E, exec, nautilus
bind = $mainMod, SPACE, exec, rofi -show drun -theme ~/.config/rofi/space-station.rasi
bind = $mainMod, T, togglesplit,
bind = $mainMod, F, fullscreen, 0

bind = $mainMod, V, exec, cliphist list | rofi -dmenu -theme ~/.config/rofi/clipboard.rasi | cliphist decode | wl-copy
bind = $mainMod SHIFT, V, togglefloating,

bind = $mainMod, C, exec, code
bind = $mainMod, B, exec, brave
bind = $mainMod, S, exec, spotify-launcher
bind = $mainMod, O, exec, obsidian

# ── Screenshots ────────────────────────────────────────────
bind = $mainMod, P, exec, hyprshot -m window
bind = $mainMod SHIFT, P, exec, hyprshot -m region
bind = , PRINT, exec, hyprshot -m window
bind = SHIFT, PRINT, exec, hyprshot -m region

# ── Terminal/Dev ───────────────────────────────────────────
bind = $mainMod, colon, exec, kitty -e tmux new-session -d -s dev
bind = $mainMod SHIFT, D, exec, kitty -e lazydocker

# ── Lock ───────────────────────────────────────────────────
bind = $mainMod, X, exec, hyprlock --immediate

# ── Focus Movement (vim + arrows) ─────────────────────────
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# ── Move Windows ───────────────────────────────────────────
bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, L, movewindow, r
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, J, movewindow, d

bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d

# ── Resize Windows ────────────────────────────────────────
bind = $mainMod CTRL, H, resizeactive, -20 0
bind = $mainMod CTRL, L, resizeactive, 20 0
bind = $mainMod CTRL, K, resizeactive, 0 -20
bind = $mainMod CTRL, J, resizeactive, 0 20

bind = $mainMod CTRL, left, resizeactive, -20 0
bind = $mainMod CTRL, right, resizeactive, 20 0
bind = $mainMod CTRL, up, resizeactive, 0 -20
bind = $mainMod CTRL, down, resizeactive, 0 20

# ── Cross-Monitor ─────────────────────────────────────────
bind = $mainMod ALT, H, movewindow, mon:l
bind = $mainMod ALT, L, movewindow, mon:r
bind = $mainMod ALT, left, movewindow, mon:l
bind = $mainMod ALT, right, movewindow, mon:r

bind = $mainMod, comma, focusmonitor, l
bind = $mainMod, period, focusmonitor, r

# ── Workspaces (AZERTY) ───────────────────────────────────
bind = $mainMod, ampersand, workspace, 1
bind = $mainMod, eacute, workspace, 2
bind = $mainMod, quotedbl, workspace, 3
bind = $mainMod, apostrophe, workspace, 4
bind = $mainMod, parenleft, workspace, 5
bind = $mainMod, minus, workspace, 6
bind = $mainMod, egrave, workspace, 7
bind = $mainMod, underscore, workspace, 8
bind = $mainMod, ccedilla, workspace, 9
bind = $mainMod, agrave, workspace, 10

# ── Workspaces (Number row fallback) ──────────────────────
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# ── Move to Workspace (AZERTY) ────────────────────────────
bind = $mainMod SHIFT, ampersand, movetoworkspace, 1
bind = $mainMod SHIFT, eacute, movetoworkspace, 2
bind = $mainMod SHIFT, quotedbl, movetoworkspace, 3
bind = $mainMod SHIFT, apostrophe, movetoworkspace, 4
bind = $mainMod SHIFT, parenleft, movetoworkspace, 5
bind = $mainMod SHIFT, minus, movetoworkspace, 6
bind = $mainMod SHIFT, egrave, movetoworkspace, 7
bind = $mainMod SHIFT, underscore, movetoworkspace, 8
bind = $mainMod SHIFT, ccedilla, movetoworkspace, 9
bind = $mainMod SHIFT, agrave, movetoworkspace, 10

# ── Move to Workspace (Number row fallback) ───────────────
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# ── Mouse Binds ───────────────────────────────────────────
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# ── Media / Hardware Keys ─────────────────────────────────
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPrev, exec, playerctl previous

bindl = , XF86AudioMicMute, exec, pactl set-source-mute @DEFAULT_SOURCE@ toggle

bindel = , XF86MonBrightnessUp, exec, brightnessctl set 10%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 10%-

# ── Camera Toggle ─────────────────────────────────────────
bindl = , XF86WebCam, exec, ~/.config/hypr/scripts/camera-toggle.sh
bind = , F6, exec, ~/.config/hypr/scripts/camera-toggle.sh
bind = $mainMod, F6, exec, cheese

# ── Theme / Wallpaper ─────────────────────────────────────
bind = $mainMod SHIFT, T, exec, ~/.config/theme/scripts/theme-picker.sh
bind = $mainMod, W, exec, ~/.config/hypr/scripts/wallpaper/wallpaper-picker.sh
bind = $mainMod SHIFT, W, exec, echo next > /tmp/wallpaper-daemon.pipe
bind = $mainMod ALT, W, exec, echo toggle-pause > /tmp/wallpaper-daemon.pipe

# ── Waybar Dropdowns ─────────────────────────────────────
bind = $mainMod, G, exec, ~/.config/waybar/scripts/dropdown-system.sh
bind = $mainMod, A, exec, ~/.config/waybar/scripts/dropdown-audio.sh
bind = $mainMod, N, exec, ~/.config/waybar/scripts/dropdown-network.sh
bind = $mainMod, M, exec, ~/.config/waybar/scripts/dropdown-hardware.sh
bind = $mainMod, D, exec, swaync-client -t

# ── Screen Annotation (gromit-mpx) ────────────────────────
# GDK_BACKEND=x11 required: gromit-mpx is X11-only, must run through Xwayland.
# Explicit /usr/local/bin path targets the PATCHED binary (built from source
# with opacity + antialiasing fixes); /usr/bin still has stock package.
#
# Super+I toggles gromit AND enters the "draw" submap, where single letters
# select tools (keyboard-only, no pad modifiers needed). Press I again (no
# modifier) inside the submap to toggle off and exit. Press Escape to leave
# the submap while keeping gromit active (useful if you need to type).
bind = $mainMod, I, exec, ~/.config/hypr/scripts/gromit-enter.sh
bind = $mainMod, Y, exec, env GDK_BACKEND=x11 /usr/local/bin/gromit-mpx --visibility
bind = $mainMod, U, exec, env GDK_BACKEND=x11 /usr/local/bin/gromit-mpx --undo
bind = $mainMod SHIFT, U, exec, env GDK_BACKEND=x11 /usr/local/bin/gromit-mpx --redo
bind = $mainMod SHIFT, I, exec, env GDK_BACKEND=x11 /usr/local/bin/gromit-mpx --clear

# Draw submap — single-key tool selection while gromit is active.
# The submap captures ALL keystrokes system-wide, so mouse/pad drawing still
# works but regular typing in other apps does NOT. Exit with Escape (keeps
# gromit on) or I (toggles gromit off + exits submap).
submap = draw
# Paint-style composition: shape and color are independent selections.
# Press any color key then any shape key (or vice-versa) — the tool script
# composes "{color} {shape}" from the persisted state files. Current state
# is shown in waybar.
# Colors
bind = , R, exec, ~/.config/hypr/scripts/gromit-tool.sh color red
bind = , B, exec, ~/.config/hypr/scripts/gromit-tool.sh color blue
bind = , Y, exec, ~/.config/hypr/scripts/gromit-tool.sh color yellow
bind = , G, exec, ~/.config/hypr/scripts/gromit-tool.sh color green
# Shapes
bind = , P, exec, ~/.config/hypr/scripts/gromit-tool.sh shape Pen
bind = , L, exec, ~/.config/hypr/scripts/gromit-tool.sh shape Line
bind = , T, exec, ~/.config/hypr/scripts/gromit-tool.sh shape Rectangle
bind = , O, exec, ~/.config/hypr/scripts/gromit-tool.sh shape Circle
bind = , F, exec, ~/.config/hypr/scripts/gromit-tool.sh shape "Filled Circle"
bind = , S, exec, ~/.config/hypr/scripts/gromit-tool.sh shape Smoothed
# Eraser (preserves shape/color state — next color/shape press exits eraser)
bind = , E, exec, ~/.config/hypr/scripts/gromit-tool.sh eraser
# Undo / redo / clear / visibility stay accessible inside the submap
bind = , U, exec, env GDK_BACKEND=x11 /usr/local/bin/gromit-mpx --undo
bind = SHIFT, U, exec, env GDK_BACKEND=x11 /usr/local/bin/gromit-mpx --redo
bind = , X, exec, env GDK_BACKEND=x11 /usr/local/bin/gromit-mpx --clear
bind = , V, exec, env GDK_BACKEND=x11 /usr/local/bin/gromit-mpx --visibility
# Keep workspace switching alive inside the draw submap — otherwise the user
# is trapped on the current workspace while annotating.
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10
# Leave submap — keep gromit canvas visible, hide waybar indicator.
# Uses a wrapper script so the indicator state-file is cleared atomically
# with the submap reset (raw `submap, reset` would leave the indicator up).
bind = , escape, exec, ~/.config/hypr/scripts/gromit-submap-leave.sh
# Toggle gromit off AND exit submap in one atomic action (single-bind script;
# Hyprland drops one of two binds on the same key in a submap).
bind = , I, exec, ~/.config/hypr/scripts/gromit-exit.sh
submap = reset

# ── System ────────────────────────────────────────────────
bind = $mainMod SHIFT, E, exec, ~/.config/waybar/scripts/power.sh
bind = $mainMod SHIFT, G, exec, ~/.config/hypr/scripts/system/gamemode.sh
bind = $mainMod SHIFT, slash, exec, ~/.config/hypr/scripts/system/keybind-hints.sh
