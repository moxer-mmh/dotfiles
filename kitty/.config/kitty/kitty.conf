# vim:fileencoding=utf-8:foldmethod=marker

# Theme colors (generated by ~/.config/theme/scripts/apply-theme.sh)
include colors.conf

# Remote control (needed for live theme switching via kitty @ set-colors)
allow_remote_control yes
listen_on unix:/tmp/kitty-sock

# Terminal Configuration {{{
# Set the TERM environment variable
term xterm-256color

# Enable true color support
allow_hyperlinks yes
# }}}

# Font Configuration {{{
font_family      JetBrainsMonoNL Nerd Font Mono
bold_font        JetBrainsMonoNL Nerd Font Mono Bold
italic_font      JetBrainsMonoNL Nerd Font Mono Italic
bold_italic_font JetBrainsMonoNL Nerd Font Mono Bold Italic

font_size 9.5
# }}}

# Window Configuration {{{
# background_opacity is set in colors.conf (generated by theme system)

# Remove window decorations
hide_window_decorations yes

# Window padding
window_padding_width 20

# Dynamic title
dynamic_background_opacity yes
# }}}

# Scrollback {{{
scrollback_lines 10000
scrollback_pager_history_size 10000
# }}}

# Mouse {{{
# Hide mouse cursor when typing
mouse_hide_wait 3.0
# }}}

# Color Scheme — all colors come from colors.conf (generated by theme system)
# Do NOT add color definitions here, they will override the theme.
# }}}

# Cursor Configuration {{{
cursor_shape block
cursor_blink_interval 0.75
cursor_stop_blinking_after 15.0
# }}}

# Keyboard Shortcuts {{{
# Copy/Paste
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard

# New window
map ctrl+shift+n new_os_window

# Font size adjustment
map ctrl+plus change_font_size all +1.0
map ctrl+minus change_font_size all -1.0
map ctrl+0 change_font_size all 0
# }}}

# Performance {{{
repaint_delay 10
input_delay 3
sync_to_monitor yes
# }}}

# Miscellaneous {{{
enable_audio_bell no
visual_bell_duration 0.0
window_alert_on_bell no
bell_on_tab no

# Confirm OS window close
confirm_os_window_close 0
# }}}
